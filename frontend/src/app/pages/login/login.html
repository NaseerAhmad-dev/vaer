<div class="page">
  <div class="card">
    <span class="logo">NOOR</span>
    <div class="divider"><span>✦</span></div>
    <h2 class="title">Welcome back</h2>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
      <input
        formControlName="email"
        type="email"
        placeholder="Email"
        autocomplete="email"
      />
      <input
        formControlName="password"
        type="password"
        placeholder="Password"
        autocomplete="current-password"
      />
      <button type="submit" class="btn" [disabled]="loading()">
        {{ loading() ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <div class="demoDivider"><span>or</span></div>
    <button type="button" class="demoBtn" (click)="demoLogin()">
      ✦ Enter as Demo Admin
    </button>

    <p class="link">No account? <a routerLink="/register">Create one</a></p>
  </div>
</div>
